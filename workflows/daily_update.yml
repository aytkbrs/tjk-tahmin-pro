name: Daily Data Update

on:
  schedule:
    - cron: '0 3 * * *'  # Her gece 03:00'te çalışır
  workflow_dispatch:      # Manuel çalıştırmaya izin verir

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pandas numpy requests beautifulsoup4
      
      - name: Run data scripts
        run: |
          python tjk_cekici.py
          python gecmis_cekici.py
          python istatistik_motoru.py
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update data" && git push)