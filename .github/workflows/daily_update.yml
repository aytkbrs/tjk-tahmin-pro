name: Daily Data Update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install pandas numpy requests beautifulsoup4
      - run: python tjk_cekici.py
      - run: python gecmis_cekici.py
      - run: python istatistik_motoru.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update" && git push)
